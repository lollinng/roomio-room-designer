name: CI

# Runs the test suite on every pull request and on pushes to feature branches.
# main is protected: changes must land via a PR whose checks pass (no direct pushes).
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build
